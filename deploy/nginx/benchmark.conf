resolver 127.0.0.11 valid=5s ipv6=off;

upstream benchmark_gateway {
    zone benchmark_gateway 64k;
    least_conn;
    server gateway:8080 resolve;
    keepalive 128;
}

server {
    listen 8080;
    server_name _;
    access_log off;

    location = /nginx-health {
        return 200 "ok\n";
    }

    location / {
        proxy_pass http://benchmark_gateway;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        add_header X-Benchmark-Upstream $upstream_addr always;
    }
}
