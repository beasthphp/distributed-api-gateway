name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8.4-alpine
        ports:
          - 6379:6379
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: gateway
          POSTGRES_PASSWORD: gateway
          POSTGRES_DB: gateway_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gateway -d gateway_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify formatting
        run: |
          unformatted="$(gofmt -l .)"
          test -z "$unformatted" || { echo "$unformatted"; exit 1; }

      - name: Resolve dependencies
        run: |
          go mod download
          go mod verify
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...
        env:
          REDIS_TEST_ADDR: "127.0.0.1:6379"
          TEST_DATABASE_URL: "postgres://gateway:gateway@127.0.0.1:5432/gateway_test?sslmode=disable"

      - name: Build services
        run: |
          go build ./cmd/gateway
          go build ./cmd/gateway-admin
          go build ./cmd/user-service
          go build ./cmd/order-service

  container:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate production configuration
        run: sh scripts/validate-production.sh .env.production.example

      - name: Build gateway image
        run: docker build --build-arg SERVICE=gateway .
