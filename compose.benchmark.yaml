name: distributed-api-gateway-benchmark

services:
  redis:
    image: redis:8.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    tmpfs: [/var/lib/postgresql]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 2s
      timeout: 2s
      retries: 30

  user-service:
    build:
      context: .
      args:
        SERVICE: user-service
    environment:
      PORT: "8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 2s
      timeout: 2s
      retries: 30

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    environment:
      PORT: "8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 2s
      timeout: 2s
      retries: 30

  gateway-admin:
    build:
      context: .
      args:
        SERVICE: gateway-admin
    command: ["bootstrap"]
    environment:
      DATABASE_URL: "postgres://gateway:gateway@postgres:5432/gateway?sslmode=disable"
      API_KEY_PEPPER: "benchmark-only-pepper-change-me"
      DEV_API_KEY: "dev-key-change-me"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    build:
      context: .
      args:
        SERVICE: gateway
    environment:
      LISTEN_ADDR: ":8080"
      USER_SERVICE_URL: "http://user-service:8081"
      ORDER_SERVICE_URL: "http://order-service:8082"
      REDIS_ADDR: "redis:6379"
      DATABASE_URL: "postgres://gateway:gateway@postgres:5432/gateway?sslmode=disable"
      API_KEY_PEPPER: "benchmark-only-pepper-change-me"
      RATE_LIMIT_FAIL_OPEN: "false"
      USAGE_QUEUE_CAPACITY: "8192"
      USAGE_BATCH_SIZE: "500"
      USAGE_FLUSH_INTERVAL: "250ms"
      USAGE_MAX_ATTEMPTS: "3"
      USAGE_RETRY_BASE_DELAY: "50ms"
      USAGE_SHUTDOWN_TIMEOUT: "10s"
    depends_on:
      redis:
        condition: service_healthy
      gateway-admin:
        condition: service_completed_successfully
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"]
      interval: 2s
      timeout: 2s
      retries: 30

  benchmark-proxy:
    image: nginx:1.31.2-alpine
    volumes:
      - ./deploy/nginx/benchmark.conf:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/nginx-health"]
      interval: 2s
      timeout: 2s
      retries: 30
    read_only: true
    tmpfs: [/etc/nginx/conf.d, /var/cache/nginx, /var/run]
