name: distributed-api-gateway

services:
  redis:
    image: redis:8.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: gateway
      POSTGRES_PASSWORD: gateway
      POSTGRES_DB: gateway
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway -d gateway"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  user-service:
    build:
      context: .
      args:
        SERVICE: user-service
    environment:
      PORT: "8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    environment:
      PORT: "8082"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  gateway-admin:
    build:
      context: .
      args:
        SERVICE: gateway-admin
    command: ["bootstrap"]
    environment:
      DATABASE_URL: "postgres://gateway:gateway@postgres:5432/gateway?sslmode=disable"
      API_KEY_PEPPER: "${API_KEY_PEPPER:-dev-only-pepper-change-me}"
      DEV_API_KEY: "${DEV_API_KEY:-dev-key-change-me}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  gateway:
    build:
      context: .
      args:
        SERVICE: gateway
    environment:
      LISTEN_ADDR: ":8080"
      USER_SERVICE_URL: "http://user-service:8081"
      ORDER_SERVICE_URL: "http://order-service:8082"
      REDIS_ADDR: "redis:6379"
      DATABASE_URL: "postgres://gateway:gateway@postgres:5432/gateway?sslmode=disable"
      API_KEY_PEPPER: "${API_KEY_PEPPER:-dev-only-pepper-change-me}"
      RATE_LIMIT_FAIL_OPEN: "false"
      USAGE_QUEUE_CAPACITY: "${USAGE_QUEUE_CAPACITY:-1024}"
      USAGE_BATCH_SIZE: "${USAGE_BATCH_SIZE:-100}"
      USAGE_FLUSH_INTERVAL: "${USAGE_FLUSH_INTERVAL:-1s}"
      USAGE_MAX_ATTEMPTS: "${USAGE_MAX_ATTEMPTS:-3}"
      USAGE_RETRY_BASE_DELAY: "${USAGE_RETRY_BASE_DELAY:-100ms}"
      USAGE_SHUTDOWN_TIMEOUT: "${USAGE_SHUTDOWN_TIMEOUT:-5s}"
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      gateway-admin:
        condition: service_completed_successfully
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.1.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
